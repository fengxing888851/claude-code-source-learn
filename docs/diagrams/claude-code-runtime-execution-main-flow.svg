<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="980" viewBox="0 0 1240 980" role="img" aria-labelledby="title desc">
  <title id="title">Claude Code 风格 Agent Runtime 执行主链图</title>
  <desc id="desc">本图只展示一次用户输入进入系统后，如何经过入口适配、启动初始化、输入处理、上下文拼装、查询循环、工具执行、会话记录和持久化的主执行骨干。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowSoft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c5f2b"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { rx: 20; ry: 20; stroke-width: 1.5; }
      .input-panel { fill: #eef8f3; stroke: #9cc8ae; }
      .main-panel { fill: #eef5ff; stroke: #9fb9e8; }
      .side-panel { fill: #fff6ea; stroke: #dbb97a; }
      .node { rx: 16; ry: 16; stroke-width: 1.5; }
      .input-node { fill: #ffffff; stroke: #84b39a; }
      .main-node { fill: #ffffff; stroke: #8fafe6; }
      .side-node { fill: #ffffff; stroke: #d4a95a; }
      .title { font: 700 30px Arial, "Helvetica Neue", "PingFang SC", sans-serif; fill: #111827; }
      .subtitle { font: 400 15px Arial, "Helvetica Neue", "PingFang SC", sans-serif; fill: #475569; }
      .group-title { font: 700 19px Arial, "Helvetica Neue", "PingFang SC", sans-serif; fill: #1f2937; }
      .panel-note { font: 600 12px Arial, "Helvetica Neue", "PingFang SC", sans-serif; fill: #64748b; }
      .node-title { font: 700 15px Arial, "Helvetica Neue", "PingFang SC", sans-serif; fill: #111827; text-anchor: middle; }
      .node-sub { font: 400 12px Arial, "Helvetica Neue", "PingFang SC", sans-serif; fill: #475569; text-anchor: middle; }
      .label { font: 600 12px Arial, "Helvetica Neue", "PingFang SC", sans-serif; fill: #475569; }
      .main-flow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .side-flow { stroke: #7c5f2b; stroke-width: 1.9; fill: none; marker-end: url(#arrowSoft); }
      .loop-flow { stroke: #64748b; stroke-width: 1.8; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1240" height="980"/>

  <text class="title" x="48" y="58">Claude Code 风格 Agent Runtime 执行主链图</text>
  <text class="subtitle" x="48" y="86">这张图只保留真正的一轮执行闭环：入口适配、启动初始化、输入处理、上下文拼装、Query 循环、工具递归和会话落盘。</text>

  <rect class="panel input-panel" x="40" y="130" width="230" height="760"/>
  <text class="group-title" x="60" y="166">入口来源</text>
  <text class="panel-note" x="60" y="188">所有模式先收敛，再进入统一骨干</text>

  <rect class="panel main-panel" x="320" y="130" width="430" height="780"/>
  <text class="group-title" x="340" y="166">执行主链</text>
  <text class="panel-note" x="340" y="188">能被 REPL / Headless / SDK 复用的共享 runtime</text>

  <rect class="panel side-panel" x="800" y="130" width="380" height="620"/>
  <text class="group-title" x="820" y="166">执行依赖与产物</text>
  <text class="panel-note" x="820" y="188">只保留真正参与这轮执行的外部交互点</text>

  <rect class="node input-node" x="72" y="230" width="166" height="70"/>
  <text class="node-title" x="155" y="258">REPL</text>
  <text class="node-sub" x="155" y="279">交互式终端会话</text>

  <rect class="node input-node" x="72" y="330" width="166" height="70"/>
  <text class="node-title" x="155" y="358">Headless / SDK</text>
  <text class="node-sub" x="155" y="379">print, stream-json, API</text>

  <rect class="node input-node" x="72" y="430" width="166" height="70"/>
  <text class="node-title" x="155" y="458">Remote Client</text>
  <text class="node-sub" x="155" y="479">viewer, controller</text>

  <text class="label" x="96" y="568">统一入口收敛</text>
  <rect class="node input-node" x="72" y="590" width="166" height="84"/>
  <text class="node-title" x="155" y="622">Entry Adapters</text>
  <text class="node-sub" x="155" y="644">argv, stdin, SDK, remote</text>

  <rect class="node main-node" x="395" y="200" width="280" height="78"/>
  <text class="node-title" x="535" y="230">main.tsx / Commander</text>
  <text class="node-sub" x="535" y="251">参数解析, 子命令, 模式分发</text>

  <rect class="node main-node" x="395" y="310" width="280" height="78"/>
  <text class="node-title" x="535" y="340">init() / setup()</text>
  <text class="node-sub" x="535" y="361">config, trust, registry bootstrap</text>

  <rect class="node main-node" x="395" y="420" width="280" height="78"/>
  <text class="node-title" x="535" y="450">processUserInput()</text>
  <text class="node-sub" x="535" y="471">normalize, slash commands, attachments</text>

  <rect class="node main-node" x="395" y="530" width="280" height="78"/>
  <text class="node-title" x="535" y="560">Prompt / Context Assembly</text>
  <text class="node-sub" x="535" y="581">systemPrompt, userContext, systemContext</text>

  <rect class="node main-node" x="395" y="640" width="280" height="78"/>
  <text class="node-title" x="535" y="670">QueryEngine / query()</text>
  <text class="node-sub" x="535" y="691">stream loop, assistant events, tool_use</text>

  <rect class="node main-node" x="395" y="750" width="280" height="78"/>
  <text class="node-title" x="535" y="780">Tool Runtime</text>
  <text class="node-sub" x="535" y="801">runTools, tool_result, progress, retries</text>

  <rect class="node main-node" x="375" y="850" width="320" height="50"/>
  <text class="node-title" x="535" y="881">Session / Transcript / Persistent Store</text>

  <rect class="node side-node" x="870" y="230" width="240" height="78"/>
  <text class="node-title" x="990" y="260">Model Provider</text>
  <text class="node-sub" x="990" y="281">streaming API, usage, retry budget</text>

  <rect class="node side-node" x="870" y="380" width="240" height="78"/>
  <text class="node-title" x="990" y="410">Filesystem / Shell</text>
  <text class="node-sub" x="990" y="431">read, edit, write, bash, git</text>

  <rect class="node side-node" x="870" y="530" width="240" height="78"/>
  <text class="node-title" x="990" y="560">Tool Result Messages</text>
  <text class="node-sub" x="990" y="581">标准消息回写, 重新进入 query</text>

  <rect class="node side-node" x="870" y="680" width="240" height="78"/>
  <text class="node-title" x="990" y="710">Final Output / Render</text>
  <text class="node-sub" x="990" y="731">终端输出, stream-json, replay</text>

  <path class="main-flow" d="M 238 632 H 320 V 239 H 395"/>
  <path class="main-flow" d="M 535 278 V 310"/>
  <path class="main-flow" d="M 535 388 V 420"/>
  <path class="main-flow" d="M 535 498 V 530"/>
  <path class="main-flow" d="M 535 608 V 640"/>
  <path class="main-flow" d="M 535 718 V 750"/>
  <path class="main-flow" d="M 535 828 V 850"/>

  <path class="side-flow" d="M 675 679 H 820 V 269 H 870"/>
  <path class="side-flow" d="M 675 789 H 820 V 419 H 870"/>
  <path class="side-flow" d="M 675 789 H 820 V 569 H 870"/>
  <path class="side-flow" d="M 695 875 H 820 V 719 H 870"/>

  <path class="loop-flow" d="M 675 789 H 730 V 679 H 675"/>
  <text class="label" x="744" y="702">tool_result 递归回路</text>

  <path class="main-flow" d="M 155 300 V 330"/>
  <path class="main-flow" d="M 155 400 V 430"/>
  <path class="main-flow" d="M 155 500 V 590"/>
</svg>
